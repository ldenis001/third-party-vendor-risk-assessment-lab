<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Third-Party Vendor Risk Assessment — GRC Dashboard</title>
<style>
:root {
  --bg: #0f1117; --surface: #1a1d27; --surface2: #242837; --border: #2e3347;
  --text: #e4e7f1; --text2: #9ca3be; --accent: #6c8aff; --accent2: #4a6adf;
  --green: #34d399; --yellow: #fbbf24; --orange: #f97316; --red: #ef4444;
  --teal: #2dd4bf; --purple: #a78bfa;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); min-height:100vh; }
.app { display:grid; grid-template-columns: 300px 1fr; grid-template-rows: 56px 1fr; height:100vh; }
header { grid-column:1/-1; background: var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 24px; }
header h1 { font-size:16px; font-weight:600; letter-spacing:.5px; }
header .badge { background: var(--accent2); color:#fff; font-size:11px; padding:3px 10px; border-radius:12px; }
.sidebar { background: var(--surface); border-right:1px solid var(--border); padding:20px 16px; overflow-y:auto; }
.main { padding:24px; overflow-y:auto; }

/* Sidebar */
.section-label { font-size:10px; text-transform:uppercase; letter-spacing:1.2px; color:var(--text2); margin:16px 0 8px; }
.field label { display:block; font-size:11px; color:var(--text2); margin-bottom:4px; }
.field { margin-bottom:12px; }
.field input, .field select, .field textarea { width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:7px 10px; border-radius:6px; font-size:13px; }
.field input:focus, .field select:focus { outline:none; border-color:var(--accent); }
.data-class-group { display:flex; flex-wrap:wrap; gap:6px; }
.data-class-group label { font-size:12px; color:var(--text); display:flex; align-items:center; gap:4px; cursor:pointer; }
.data-class-group input[type=checkbox] { accent-color: var(--accent); }

/* Risk Gauge */
.gauge-wrap { text-align:center; margin:12px 0; }
.gauge-label { font-size:10px; text-transform:uppercase; color:var(--text2); letter-spacing:1px; margin-bottom:4px; }
.gauge-score { font-size:42px; font-weight:700; }
.gauge-tier { font-size:13px; font-weight:600; margin-top:2px; }

/* Tabs */
.tabs { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:20px; }
.tab { padding:7px 14px; border-radius:6px; font-size:12px; font-weight:500; cursor:pointer; background:var(--surface); border:1px solid var(--border); color:var(--text2); transition:.15s; }
.tab:hover { border-color:var(--accent); color:var(--text); }
.tab.active { background:var(--accent2); border-color:var(--accent); color:#fff; }

/* Framework Panel */
.fw-panel { display:none; }
.fw-panel.active { display:block; }
.fw-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.fw-header h2 { font-size:18px; font-weight:600; }
.fw-progress { display:flex; align-items:center; gap:10px; }
.fw-progress .bar-bg { width:160px; height:8px; background:var(--surface); border-radius:4px; overflow:hidden; }
.fw-progress .bar-fill { height:100%; border-radius:4px; transition:width .3s; }
.fw-progress .pct { font-size:13px; font-weight:600; min-width:40px; text-align:right; }

/* Question table */
.q-table { width:100%; border-collapse:separate; border-spacing:0; }
.q-table th { text-align:left; font-size:11px; text-transform:uppercase; color:var(--text2); letter-spacing:.8px; padding:8px 12px; border-bottom:1px solid var(--border); }
.q-table td { padding:10px 12px; border-bottom:1px solid var(--border); font-size:13px; vertical-align:middle; }
.q-table tr:hover td { background:var(--surface2); }
.q-table .ctrl-id { color:var(--accent); font-weight:600; font-size:12px; white-space:nowrap; }
.q-table select { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:5px 8px; border-radius:5px; font-size:12px; }
.q-table select.scored-compliant { border-color:var(--green); }
.q-table select.scored-partial { border-color:var(--yellow); }
.q-table select.scored-noncompliant { border-color:var(--red); }
.q-table select.scored-na { border-color:var(--text2); }
.q-table .notes-input { width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:5px 8px; border-radius:5px; font-size:12px; }

/* Summary cards */
.summary-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:12px; margin-bottom:24px; }
.summary-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px; text-align:center; }
.summary-card .fw-name { font-size:11px; text-transform:uppercase; letter-spacing:.8px; color:var(--text2); margin-bottom:6px; }
.summary-card .fw-score { font-size:28px; font-weight:700; }
.summary-card .fw-status { font-size:11px; margin-top:4px; font-weight:500; }

/* Buttons */
.btn { padding:10px 20px; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; transition:.15s; }
.btn-primary { background:var(--accent2); color:#fff; }
.btn-primary:hover { background:var(--accent); }
.btn-secondary { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
.btn-secondary:hover { background:var(--border); }
.actions { display:flex; gap:10px; margin-top:20px; }

/* Report modal */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:100; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:12px; max-width:900px; width:90%; max-height:85vh; overflow-y:auto; padding:28px; }
.modal h2 { margin-bottom:16px; }
.modal .close-btn { float:right; background:none; border:none; color:var(--text2); font-size:20px; cursor:pointer; }
.report-section { margin-bottom:20px; }
.report-section h3 { font-size:14px; color:var(--accent); margin-bottom:8px; }
.report-table { width:100%; border-collapse:collapse; font-size:12px; }
.report-table th, .report-table td { padding:6px 10px; border:1px solid var(--border); text-align:left; }
.report-table th { background:var(--surface2); color:var(--text2); text-transform:uppercase; font-size:10px; letter-spacing:.5px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div style="display:flex;align-items:center;gap:16px;">
      <h1>Third-Party Vendor Risk Assessment — GRC Dashboard</h1>
      <a href="index.html" style="font-size:12px;color:var(--accent);text-decoration:none;border:1px solid var(--border);padding:4px 12px;border-radius:6px;">← SIG Lite Intake</a>
      <a href="dashboard.html" style="font-size:12px;color:var(--accent);text-decoration:none;border:1px solid var(--border);padding:4px 12px;border-radius:6px;">SIG Report →</a>
    </div>
    <span class="badge" id="reportBadge">REPORT PENDING</span>
  </header>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="section-label">Vendor Information</div>
    <div class="field"><label>Company Name</label><input type="text" id="vendorName" placeholder="e.g. Acme Corp"></div>
    <div class="field"><label>Primary Contact</label><input type="text" id="contactName" placeholder="Full name"></div>
    <div class="field"><label>Contact Email</label><input type="email" id="contactEmail" placeholder="email@company.com"></div>
    <div class="field"><label>Assessment Date</label><input type="date" id="assessDate"></div>
    <div class="field">
      <label>Industry / Sector</label>
      <select id="industry">
        <option value="">Select…</option>
        <option>Healthcare</option><option>Financial Services</option><option>Government / Federal</option>
        <option>Technology / SaaS</option><option>Energy / Utilities</option><option>Transportation</option>
        <option>Retail / E-Commerce</option><option>Manufacturing</option><option>Education</option><option>Other</option>
      </select>
    </div>
    <div class="field">
      <label>Data Classification Handled</label>
      <div class="data-class-group">
        <label><input type="checkbox" value="confidential"> Confidential</label>
        <label><input type="checkbox" value="restricted"> Restricted</label>
        <label><input type="checkbox" value="internal"> Internal</label>
        <label><input type="checkbox" value="public"> Public</label>
      </div>
    </div>

    <div class="section-label">Composite Risk</div>
    <div class="gauge-wrap">
      <div class="gauge-label">Overall Score</div>
      <div class="gauge-score" id="overallScore" style="color:var(--text2)">—</div>
      <div class="gauge-tier" id="overallTier" style="color:var(--text2)">Not Assessed</div>
    </div>

    <div class="section-label">Applicable Frameworks</div>
    <div id="fwToggles" style="display:flex;flex-direction:column;gap:6px;"></div>

    <div class="actions" style="flex-direction:column; margin-top:20px;">
      <button class="btn btn-primary" onclick="generateReport()">Generate Risk Report</button>
      <button class="btn btn-secondary" onclick="resetAll()">Reset Assessment</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="section-label">Framework Compliance Summary</div>
    <div class="summary-grid" id="summaryGrid"></div>

    <div class="tabs" id="tabBar"></div>
    <div id="panelContainer"></div>
  </div>
</div>

<!-- Report Modal -->
<div class="modal-overlay" id="reportModal">
  <div class="modal">
    <button class="close-btn" onclick="document.getElementById('reportModal').classList.remove('open')">&times;</button>
    <h2>Vendor Compliance Risk Report</h2>
    <div id="reportContent"></div>
  </div>
</div>

// ── Initialize ──

  Object.keys(FRAMEWORKS).forEach(key => {

    responses[key] = {};
    const label = document.createElement('label');
    label.style.cssText = 'display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;';
    label.innerHTML = `<input type="checkbox" checked data-fw="${key}" style="accent-color:${FRAMEWORKS[key].color}"> ${FRAMEWORKS[key].short}`;
    label.querySelector('input').addEventListener('change', e => {
      enabledFrameworks[key] = e.target.checked;
      renderAll();
    });
    toggleContainer.appendChild(label);
  });
  renderAll();
}

function renderAll() {
  renderSummary();
  renderTabs();
  renderPanels();
  updateOverallScore();
}

function renderSummary() {
  const grid = document.getElementById('summaryGrid');
  grid.innerHTML = '';
  Object.entries(FRAMEWORKS).forEach(([key, fw]) => {
    if (!enabledFrameworks[key]) return;
    const { score, answered, total } = calcFrameworkScore(key);
    const card = document.createElement('div');
    card.className = 'summary-card';
    card.style.borderTop = `3px solid ${fw.color}`;
    const displayScore = answered > 0 ? Math.round(score) + '%' : '—';
    const scoreColor = answered > 0 ? scoreToColor(score) : 'var(--text2)';
    const status = answered > 0 ? scoreToLabel(score) : `0 / ${total} assessed`;
    card.innerHTML = `<div class="fw-name">${fw.short}</div><div class="fw-score" style="color:${scoreColor}">${displayScore}</div><div class="fw-status" style="color:${scoreColor}">${status}</div>`;
    grid.appendChild(card);
  });
}

function renderTabs() {
  const bar = document.getElementById('tabBar');
  const activeKey = bar.querySelector('.tab.active')?.dataset.fw || Object.keys(FRAMEWORKS).find(k => enabledFrameworks[k]);
  bar.innerHTML = '';
  Object.entries(FRAMEWORKS).forEach(([key, fw]) => {
    if (!enabledFrameworks[key]) return;
    const tab = document.createElement('div');
    tab.className = 'tab' + (key === activeKey ? ' active' : '');
    tab.dataset.fw = key;
    tab.textContent = fw.short;
    tab.style.borderColor = key === activeKey ? fw.color : '';
    tab.addEventListener('click', () => {
      bar.querySelectorAll('.tab').forEach(t => { t.classList.remove('active'); t.style.borderColor = ''; });
      tab.classList.add('active');
      tab.style.borderColor = fw.color;
      document.querySelectorAll('.fw-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-' + key).classList.add('active');
    });
    bar.appendChild(tab);
  });
}

function renderPanels() {
  const container = document.getElementById('panelContainer');
  container.innerHTML = '';
  const activeTab = document.querySelector('.tab.active');
  const activeKey = activeTab ? activeTab.dataset.fw : Object.keys(FRAMEWORKS).find(k => enabledFrameworks[k]);

  Object.entries(FRAMEWORKS).forEach(([key, fw]) => {
    if (!enabledFrameworks[key]) return;
    const panel = document.createElement('div');
    panel.className = 'fw-panel' + (key === activeKey ? ' active' : '');
    panel.id = 'panel-' + key;

    const { score, answered, total } = calcFrameworkScore(key);
    const pct = answered > 0 ? Math.round(score) : 0;

    let html = `<div class="fw-header"><h2>${fw.name}</h2><div class="fw-progress"><div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${scoreToColor(pct)}"></div></div><span class="pct" style="color:${scoreToColor(pct)}">${answered > 0 ? pct + '%' : '—'}</span></div></div>`;
    html += `<table class="q-table"><thead><tr><th style="width:100px">Control</th><th>Requirement</th><th style="width:80px">Category</th><th style="width:140px">Status</th><th style="width:180px">Notes / Evidence</th></tr></thead><tbody>`;
    fw.controls.forEach((ctrl, i) => {
      const val = responses[key][i] || '';
      html += `<tr>
        <td class="ctrl-id">${ctrl.id}</td>
        <td>${ctrl.text}</td>
        <td style="font-size:11px;color:var(--text2)">${ctrl.category}</td>
        <td><select class="scored-${val}" data-fw="${key}" data-idx="${i}" onchange="handleScore(this)">
          ${STATUS_OPTIONS.map(o => `<option value="${o.value}" ${o.value===val?'selected':''}>${o.label}</option>`).join('')}
        </select></td>
        <td><input class="notes-input" type="text" placeholder="Evidence or notes…" data-fw="${key}" data-idx="${i}"></td>
      </tr>`;
    });
    html += '</tbody></table>';
    panel.innerHTML = html;
    container.appendChild(panel);
  });
}

function handleScore(el) {
  const fw = el.dataset.fw, idx = el.dataset.idx;
  responses[fw][idx] = el.value;
  el.className = el.value ? 'scored-' + el.value : '';
  renderSummary();
  updateOverallScore();
  // Update panel progress bar
  const { score, answered } = calcFrameworkScore(fw);
  const pct = answered > 0 ? Math.round(score) : 0;
  const panel = document.getElementById('panel-' + fw);
  const fill = panel.querySelector('.bar-fill');
  const pctEl = panel.querySelector('.pct');
  fill.style.width = pct + '%';
  fill.style.background = scoreToColor(pct);
  pctEl.textContent = answered > 0 ? pct + '%' : '—';
  pctEl.style.color = scoreToColor(pct);
}

function calcFrameworkScore(key) {
  const fw = FRAMEWORKS[key];
  let totalScore = 0, answered = 0;
  fw.controls.forEach((_, i) => {
    const val = responses[key][i];
    const opt = STATUS_OPTIONS.find(o => o.value === val);
    if (opt && opt.score !== null) { totalScore += opt.score; answered++; }
  });
  return { score: answered > 0 ? totalScore / answered : 0, answered, total: fw.controls.length };
}

function updateOverallScore() {
  let totalScore = 0, totalAnswered = 0;
  Object.keys(FRAMEWORKS).forEach(key => {
    if (!enabledFrameworks[key]) return;
    const { score, answered } = calcFrameworkScore(key);
    totalScore += score * answered;
    totalAnswered += answered;
  });
  const overall = totalAnswered > 0 ? totalScore / totalAnswered : -1;
  const scoreEl = document.getElementById('overallScore');
  const tierEl = document.getElementById('overallTier');
  if (overall < 0) {
    scoreEl.textContent = '—'; scoreEl.style.color = 'var(--text2)';
    tierEl.textContent = 'Not Assessed'; tierEl.style.color = 'var(--text2)';
  } else {
    scoreEl.textContent = Math.round(overall) + '%';
    scoreEl.style.color = scoreToColor(overall);
    tierEl.textContent = scoreToLabel(overall);
    tierEl.style.color = scoreToColor(overall);
  }
}

function scoreToColor(s) {
  if (s >= 80) return 'var(--green)';
  if (s >= 60) return 'var(--yellow)';
  if (s >= 40) return 'var(--orange)';
  return 'var(--red)';
}
function scoreToLabel(s) {
  if (s >= 80) return 'Low Risk';
  if (s >= 60) return 'Moderate Risk';
  if (s >= 40) return 'High Risk';
  return 'Critical Risk';
}

function generateReport() {
  const vendor = document.getElementById('vendorName').value || 'Unknown Vendor';
  const date = document.getElementById('assessDate').value || new Date().toISOString().slice(0,10);
  const industry = document.getElementById('industry').value || 'Not specified';
  const contact = document.getElementById('contactName').value || '—';
  const email = document.getElementById('contactEmail').value || '—';

  let anyAnswered = false;
  Object.keys(FRAMEWORKS).forEach(k => { if (enabledFrameworks[k] && calcFrameworkScore(k).answered > 0) anyAnswered = true; });
  if (!anyAnswered) { alert('Please assess at least one control before generating a report.'); return; }

  let html = `<div class="report-section"><h3>Assessment Summary</h3>
    <table class="report-table"><tr><th>Vendor</th><td>${vendor}</td><th>Date</th><td>${date}</td></tr>
    <tr><th>Industry</th><td>${industry}</td><th>Contact</th><td>${contact} (${email})</td></tr></table></div>`;

  html += `<div class="report-section"><h3>Framework Scores</h3><table class="report-table">
    <tr><th>Framework</th><th>Score</th><th>Risk Level</th><th>Assessed</th><th>Gaps (Non-Compliant)</th></tr>`;

  let gaps = [];
  Object.entries(FRAMEWORKS).forEach(([key, fw]) => {
    if (!enabledFrameworks[key]) return;
    const { score, answered, total } = calcFrameworkScore(key);
    if (answered === 0) return;
    const pct = Math.round(score);
    let gapCount = 0;
    fw.controls.forEach((ctrl, i) => {
      if (responses[key][i] === 'noncompliant') {
        gapCount++;
        gaps.push({ framework: fw.short, id: ctrl.id, text: ctrl.text });
      }
    });
    html += `<tr><td>${fw.short}</td><td style="color:${scoreToColor(pct)};font-weight:600">${pct}%</td>
      <td style="color:${scoreToColor(pct)}">${scoreToLabel(pct)}</td>
      <td>${answered} / ${total}</td><td style="color:${gapCount > 0 ? 'var(--red)' : 'var(--green)'}">${gapCount}</td></tr>`;
  });
  html += '</table></div>';

  if (gaps.length > 0) {
    html += `<div class="report-section"><h3>Critical Gaps — Non-Compliant Controls</h3><table class="report-table">
      <tr><th>Framework</th><th>Control</th><th>Requirement</th></tr>`;
    gaps.forEach(g => { html += `<tr><td>${g.framework}</td><td style="color:var(--accent);font-weight:600">${g.id}</td><td>${g.text}</td></tr>`; });
    html += '</table></div>';
  }

  // Recommendations
  html += `<div class="report-section"><h3>Recommendations</h3><table class="report-table"><tr><th>#</th><th>Action</th><th>Priority</th></tr>`;
  let recNum = 1;
  if (gaps.length > 0) html += `<tr><td>${recNum++}</td><td>Address ${gaps.length} non-compliant control(s) identified above — develop remediation plan with owner and timeline</td><td style="color:var(--red)">Critical</td></tr>`;

  Object.entries(FRAMEWORKS).forEach(([key, fw]) => {
    if (!enabledFrameworks[key]) return;
    let partials = 0;
    fw.controls.forEach((_, i) => { if (responses[key][i] === 'partial') partials++; });
    if (partials > 0) html += `<tr><td>${recNum++}</td><td>${fw.short}: ${partials} partially compliant control(s) — request evidence or remediation timeline from vendor</td><td style="color:var(--yellow)">High</td></tr>`;
  });
  html += `<tr><td>${recNum++}</td><td>Schedule follow-up assessment in 90 days to verify remediation progress</td><td style="color:var(--teal)">Medium</td></tr>`;
  html += '</table></div>';

  document.getElementById('reportContent').innerHTML = html;
  document.getElementById('reportModal').classList.add('open');
  document.getElementById('reportBadge').textContent = 'REPORT GENERATED';
  document.getElementById('reportBadge').style.background = 'var(--green)';
}

function resetAll() {
  if (!confirm('Reset all assessment data?')) return;
  Object.keys(responses).forEach(k => responses[k] = {});
  renderAll();
  document.getElementById('reportBadge').textContent = 'REPORT PENDING';
  document.getElementById('reportBadge').style.background = '';
}

init();
</script>
</body>
</html>
