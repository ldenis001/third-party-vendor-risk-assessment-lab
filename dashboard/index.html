<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vendor Risk Intake - SIG Lite Assessment</title>
  <style>
    :root {
      --bg0: #070b13;
      --bg1: #05070f;
      --surface: rgba(255, 255, 255, 0.04);
      --surface2: rgba(255, 255, 255, 0.07);
      --border: rgba(255, 255, 255, 0.14);
      --text: rgba(255, 255, 255, 0.92);
      --muted: rgba(255, 255, 255, 0.62);
      --accent: #0ea5e9;
      --accent2: #38bdf8;
      --danger: #ef4444;
      --warning: #eab308;
      --ok: #22c55e;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: var(--sans);
      color: var(--text);
      background:
        radial-gradient(900px 500px at 10% 0%, rgba(14, 165, 233, 0.18), transparent 55%),
        radial-gradient(800px 500px at 100% 20%, rgba(233, 30, 99, 0.12), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
    }

    .shell {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 18px;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .tagline {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.6px;
    }

    .pill {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(14, 165, 233, 0.3);
      background: rgba(14, 165, 233, 0.08);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: fit-content;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15);
      animation: pulse 2.2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.85); }
    }

    .panel {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      backdrop-filter: blur(6px);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
      overflow: hidden;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 220px;
    }

    label {
      font-size: 12px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.72);
      letter-spacing: 0.3px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(0, 0, 0, 0.22);
      color: var(--text);
      outline: none;
    }

    input:focus, select:focus {
      border-color: rgba(56, 189, 248, 0.55);
      box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.14);
    }

    .progress-meta {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin: 12px 0 8px 0;
      font-family: var(--mono);
      font-size: 12px;
      color: rgba(255, 255, 255, 0.8);
    }

    .progress-track {
      height: 12px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, rgba(56, 189, 248, 0.1), rgba(56, 189, 248, 0.55), rgba(56, 189, 248, 0.1));
      border-radius: 999px;
      transition: width 0.25s ease;
    }

    .hint {
      margin-top: 12px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
    }

    .q-stack {
      margin-top: 14px;
    }

    .question {
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 14px;
      padding: 14px 16px;
      margin: 12px 0;
      background: rgba(0, 0, 0, 0.18);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
    }

    .question.answered {
      border-color: rgba(56, 189, 248, 0.4);
      background: linear-gradient(180deg, rgba(56, 189, 248, 0.04), rgba(0, 0, 0, 0.16));
    }

    .q-id {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .q-text {
      font-weight: 800;
      letter-spacing: -0.2px;
      margin-bottom: 10px;
    }

    .q-options {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .q-options button {
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.03);
      color: rgba(255, 255, 255, 0.86);
      padding: 8px 12px;
      border-radius: 999px;
      cursor: pointer;
      transition: border-color 0.2s ease, transform 0.2s ease, background 0.2s ease;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    .q-options button:hover {
      border-color: rgba(56, 189, 248, 0.4);
      background: rgba(56, 189, 248, 0.08);
      transform: translateY(-1px);
    }

    .q-options button.selected-yes {
      border-color: rgba(34, 197, 94, 0.6);
      background: rgba(34, 197, 94, 0.14);
    }

    .q-options button.selected-partial {
      border-color: rgba(234, 179, 8, 0.6);
      background: rgba(234, 179, 8, 0.14);
    }

    .q-options button.selected-no {
      border-color: rgba(239, 68, 68, 0.6);
      background: rgba(239, 68, 68, 0.14);
    }

    .q-options button.selected-na {
      border-color: rgba(148, 163, 184, 0.55);
      background: rgba(148, 163, 184, 0.14);
    }

    #submit-btn {
      margin-top: 12px;
      width: 100%;
      border-radius: 14px;
      font-weight: 900;
      letter-spacing: 0.5px;
      padding: 12px 14px;
      border: 1px solid rgba(56, 189, 248, 0.3);
      background: rgba(56, 189, 248, 0.09);
      color: rgba(255, 255, 255, 0.9);
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    }

    #submit-btn:hover {
      border-color: rgba(56, 189, 248, 0.55);
      background: rgba(56, 189, 248, 0.16);
      transform: translateY(-1px);
    }

    #submit-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    #submit-btn.armed {
      box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.14);
    }

    @media (max-width: 900px) {
      .form-grid { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 600px) {
      header { flex-direction: column; align-items: flex-start; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div>
        <h1><span style="color: var(--accent);">SIG Lite</span> · Vendor Risk Intake</h1>
        <div class="tagline">Homelab TPRM lab — answer at least 80% to generate a report.</div>
      </div>
      <div class="pill"><span class="dot"></span> DASHBOARD READY</div>
    </header>

    <div class="panel">
      <div class="form-grid">
        <div class="field"><label for="vendor-name">Company Name *</label><input id="vendor-name" /></div>
        <div class="field"><label for="contact-name">Primary Contact Name *</label><input id="contact-name" /></div>
        <div class="field"><label for="contact-email">Contact Email *</label><input id="contact-email" type="email" /></div>
        <div class="field">
          <label for="data-class">Data Classification Handled</label>
          <select id="data-class">
            <option value="">Select...</option>
            <option value="public">Public</option>
            <option value="internal">Internal / Non-sensitive</option>
            <option value="confidential">Confidential / PII</option>
            <option value="restricted">Restricted / PHI / Financial</option>
          </select>
        </div>
        <div class="field"><label for="vendor-industry">Industry / Sector</label><input id="vendor-industry" /></div>
        <div class="field"><label for="assess-date">Assessment Date</label><input id="assess-date" type="date" /></div>
      </div>

      <div class="progress-meta">
        <div id="pct-label">0%</div>
        <div><span id="answered-count">0</span>/<span id="total-count">0</span> questions</div>
      </div>
      <div class="progress-track"><div id="progress-bar"></div></div>
      <div class="hint">Completion requirement: ≥ 80% (N/A is acceptable).</div>

      <div id="questions-container" class="q-stack"></div>
      <button id="submit-btn" onclick="submitAssessment()" disabled>Generate Risk Report →</button>
      <div class="hint">TIP: If you want to look extra slick, answer YES/NO fast, then tweak partials.</div>
    </div>
  </div>

  <script src="sig-lite-map.js"></script>
  <script>
    const container = document.getElementById('questions-container');
    const answers = {};
    let totalQ = 0;

    SIG_LITE_DOMAINS.forEach((domain) => {
      const section = document.createElement('div');
      section.innerHTML = `
        <div class="q-id" style="margin-top:14px; color: rgba(255,255,255,.74);">
          SECTION ${domain.id} • ${domain.name} • ${domain.nistRef} • ${domain.isoRef}
        </div>`;

      domain.questions.forEach((q) => {
        totalQ++;
        const card = document.createElement('div');
        card.className = 'question';
        card.id = `card-${q.id}`;
        card.innerHTML = `
          <div class="q-id">${q.id} // WEIGHT: ${q.weight}</div>
          <div class="q-text">${q.text}</div>
          <div class="q-options">
            <button onclick="ans('${q.id}','yes',this,${q.weight})">✓ YES</button>
            <button onclick="ans('${q.id}','partial',this,${q.weight})">~ PARTIAL</button>
            <button onclick="ans('${q.id}','no',this,${q.weight})">✗ NO</button>
            <button onclick="ans('${q.id}','na',this,${q.weight})">— N/A</button>
          </div>`;
        section.appendChild(card);
      });

      container.appendChild(section);
    });

    document.getElementById('total-count').textContent = totalQ;

    function ans(qid, value, btn, weight) {
      answers[qid] = { value, weight };

      btn.parentElement.querySelectorAll('button').forEach((b) => {
        b.className = '';
      });

      btn.classList.add(`selected-${value}`);
      document.getElementById(`card-${qid}`).classList.add('answered');

      const done = Object.keys(answers).length;
      const pct = Math.round((done / totalQ) * 100);

      document.getElementById('progress-bar').style.width = pct + '%';
      document.getElementById('pct-label').textContent = pct + '%';
      document.getElementById('answered-count').textContent = done;

      const armed = done >= totalQ * 0.8;
      const btnSubmit = document.getElementById('submit-btn');
      btnSubmit.disabled = !armed;
      btnSubmit.classList.toggle('armed', armed);
    }

    function submitAssessment() {
      const d = {
        vendorName: document.getElementById('vendor-name').value || 'Unknown Vendor',
        contactName: document.getElementById('contact-name').value || '',
        contactEmail: document.getElementById('contact-email').value || '',
        dataClass: document.getElementById('data-class').value || 'unknown',
        industry: document.getElementById('vendor-industry').value || '',
        assessDate: document.getElementById('assess-date').value || new Date().toISOString().split('T')[0],
        answers,
      };

      localStorage.setItem('sig_lite_assessment', JSON.stringify(d));
      window.location.href = 'dashboard.html';
    }

    document.getElementById('assess-date').valueAsDate = new Date();
  </script>
</body>
</html>
